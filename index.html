            --font-display: 'Orbitron', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    <style>
        :root {
            --primary: #00f0ff;
            --primary-dim: #00a8b3;
            --secondary: #ff00aa;
            --accent: #7b2dff;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --text: #e0e0e0;
            --text-dim: #8888aa;
            --glow-primary: 0 0 20px rgba(0, 240, 255, 0.3);
            --glow-secondary: 0 0 20px rgba(255, 0, 170, 0.3);
            --border-color: rgba(0, 240, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 0, 170, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0f 0%, #0f0f18 100%);
            pointer-events: none;
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
        }

        .header-content {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }

        .logo {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: var(--glow-primary);
            letter-spacing: 2px;
        }

        .date-display {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .float-export-btn {
            display: none;
        }

        .float-export-btn span {
            display: none;
        }

        .float-export-btn:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.3), rgba(255, 0, 170, 0.3));
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            transform: scale(1.1);
        }

        button:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.3), rgba(255, 0, 170, 0.3)) !important;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .ticker-wrap {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.1), rgba(255, 0, 170, 0.1));
            border-bottom: 1px solid var(--border-color);
            padding: 0.8rem 0;
            overflow: hidden;
            position: relative;
        }

        .ticker {
            display: flex;
            animation: ticker 30s linear infinite;
            white-space: nowrap;
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            padding: 0 2rem;
            color: var(--text);
            font-size: 0.95rem;
            position: relative;
        }

        .ticker-item::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 1rem;
            box-shadow: var(--glow-primary);
            animation: pulse 2s ease-in-out infinite;
        }

        .ticker-item .time {
            color: var(--primary);
            margin-right: 0.8rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        main {
            max-width: 100%;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        .section-title {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .export-all-header-btn {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(255, 0, 170, 0.2));
            border: 1px solid rgba(0, 240, 255, 0.4);
            color: #00f0ff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .export-all-header-btn:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.3), rgba(255, 0, 170, 0.3));
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .news-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: var(--glow-primary);
            border-color: var(--primary-dim);
        }

        .news-card:hover::before {
            opacity: 1;
        }

        .news-rank {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: rgba(0, 240, 255, 0.1);
            line-height: 1;
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: var(--text);
            line-height: 1.5;
            padding-right: 3.5rem;
        }

        .news-summary {
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .news-summary {
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .news-analysis {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(255, 0, 170, 0.1));
            border-left: 3px solid #00f0ff;
            padding: 0.8rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
            color: #aaaacc;
            line-height: 1.5;
        }

        .news-analysis-label {
            color: #00f0ff;
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 0.3rem;
            display: block;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .news-source {
            color: var(--primary);
            font-weight: 500;
        }

        .original-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            transition: all 0.3s ease;
        }

        .original-link:hover {
            background: rgba(0, 240, 255, 0.2);
            border-color: var(--primary);
            color: var(--primary);
        }

        .export-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: var(--bg-dark);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .export-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--glow-primary);
        }

        .export-all-btn {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 2rem auto;
        }

        .export-all-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--glow-secondary);
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--primary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: var(--text);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: #00ff88;
        }

        .export-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 200;
            overflow: auto;
            padding: 2rem;
        }

        .export-container.active {
            display: block;
        }

        .export-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .export-close {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .export-close:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .export-actions {
            display: flex;
            gap: 1rem;
        }

        .export-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .export-news-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            margin-top: 3rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 768px) {

            }
            
            #headerExportBtn {

            }
            
            .float-export-btn {

            }
            
            .export-container {

            .export-content {
                padding: 0.3rem;
            }
            
            .export-content > div {
                padding: 0.5rem !important;
            }
            
            .export-content .export-news-card {
                padding: 0.6rem !important;

            .export-content h3 {
                font-size: 0.8rem !important;
                padding-right: 2rem !important;
            }
            
            .export-content p {
                font-size: 0.65rem !important;
            }
            
            .export-content > div > img {
                width: 60px !important;
                height: 60px !important;
            }
            
            .export-content .export-news-card > div:first-child {
                font-size: 1.2rem !important;
            }
            
            .export-header {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
            }
            
            .export-actions {
                width: 100%;
                justify-content: space-between;
            }
        }

</head>

        function formatDate(date) {
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            return date.toLocaleDateString('zh-CN', options);
        }

        function getToday() {
            const date = new Date();
            return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
        }

        document.getElementById('currentDate').textContent = formatDate(new Date());

        function initTicker() {
            const ticker = document.getElementById('ticker');
            const items = [...mockTickerNews, ...mockTickerNews];
            ticker.innerHTML = items.map(item => `
                <div class="ticker-item">
                    <span class="time">${item.time}</span>
                    <span>${item.title}</span>
                </div>
            `).join('');
        }

        function renderNews(news) {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = news.map(item => {
                const url = item.url && item.url.startsWith('http') ? item.url : (sourceUrls[item.source] || '#');
                const analysis = item.analysis ? `<div class="news-analysis"><span class="news-analysis-label">AI解读</span>${item.analysis}</div>` : '';
                return `
                <div class="news-card">
                    <div class="news-rank">${item.rank}</div>
                    <h3 class="news-title">${item.title}</h3>
                    <p class="news-summary">${item.summary}</p>
                    ${analysis}
                    <div class="news-meta">
                        <span class="news-source">${item.source}</span>
                        <a href="${url}" target="_blank" class="original-link">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <line x1="10" y1="14" x2="21" y2="3"></line>
                            </svg>
                            查看原文
                        </a>
                    </div>
                </div>
            `}).join('');
        }

                <div style="background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%); padding: 2rem; border-radius: 16px; border: 1px solid rgba(0, 240, 255, 0.2);">

        async function exportAll() {
            const container = document.getElementById('exportContainer');
            const content = document.getElementById('exportContent');
            
            const top5News = mockHotNews.slice(0, 5);
            const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent('https://yang6633.github.io/ai-daily/')}`;
            
            let qrCodeBase64 = '';
            try {
                const qrResponse = await fetch(qrCodeUrl);
                const qrBlob = await qrResponse.blob();
                qrCodeBase64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(qrBlob);
                });
            } catch (e) {
                qrCodeBase64 = qrCodeUrl;
            }
            
            content.innerHTML = `
                <div id="exportPoster" style="background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%); padding: 1rem; border-radius: 16px; border: 1px solid rgba(0, 240, 255, 0.2);">

            `;
            
            container.classList.add('active');
        }

        function closeExport() {
            document.getElementById('exportContainer').classList.remove('active');

        async function downloadImage() {
            const poster = document.getElementById('exportPoster');
            if (!poster) {
                showToast('请先生成海报');
                return;
            }
            
            try {
                const canvas = await html2canvas(poster, {
                    backgroundColor: '#0a0a0f',
                    scale: 2,
                    useCORS: true
                });
                
                const dataUrl = canvas.toDataURL('image/png');
                
                // 直接显示图片，让用户长按保存
                const exportContainer = document.getElementById('exportContainer');
                const exportContent = document.getElementById('exportContent');
                
                exportContent.innerHTML = `
                    <div style="text-align:center; padding: 2rem;">
                        <img src="${dataUrl}" style="max-width:100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
                        <p style="margin-top:1.5rem; color:#00f0ff; font-size:1rem;">👆 长按图片保存到手机</p>
                        <button onclick="closeExport()" style="margin-top:1rem; padding:0.6rem 1.5rem; background:rgba(0,240,255,0.2); border:1px solid rgba(0,240,255,0.4); color:#00f0ff; border-radius:8px; cursor:pointer;">关闭</button>
                    </div>
                `;
                
                showToast('图片已生成');
            } catch (e) {
                showToast('导出失败，请重试');
            }
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function callModelScopeAPI(prompt, timeout = 15000) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                
                const response = await fetch(API_CONFIG.base_url + '/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_CONFIG.api_key}`
                    },
                    body: JSON.stringify({
                        model: API_CONFIG.model,
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.7
                    }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`API request failed: ${response.status}`);
                }
                
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }

async function fetchAInews() {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            const dateStr = yesterday.toISOString().split('T')[0];
            const displayDate = `${yesterday.getMonth()+1}月${yesterday.getDate()}日`;
            
            const prompt = `搜索${dateStr}（昨天${displayDate}）的AI热点新闻，从以下来源筛选对普通人有价值的10条：
- 36氪 (36kr.com)
- 机器之心 (jiqizhixin.com)  
- 新浪科技/新浪AI (k.sina.com.cn)
- 腾讯科技 (new.qq.com)
- 网易科技 (tech.163.com)
- 每日经济新闻 (nbd.com.cn)
- 界面新闻 (jiemian.com)
- 虎嗅 (huxiu.com)
- 钛媒体 (tmtpost.com)
- 品玩 (pinw.com)

筛选标准（对普通人有价值）：
1. AI产品应用（如豆包、Kimi等工具）
2. 有重大突破的技术进展
3. 大公司新动作
4. 与日常生活相关的AI
5. 中国AI重要动态

返回JSON数组格式：[{rank:1,title:"标题",summary:"50字摘要",source:"来源",url:"具体文章URL"}]
直接返回JSON数组，不要其他文字。`;

            try {
                const result = await callModelScopeAPI(prompt);
                if (result) {
                    // 尝试从返回内容中提取JSON
                    let news = null;
                    try {
                        news = JSON.parse(result);
                    } catch {
                        // 尝试找到JSON数组
                        const match = result.match(/\[[\s\S]*\]/);
                        if (match) {
                            try {
                                news = JSON.parse(match[0]);
                            } catch {}
                        }
                    }
                    if (news && Array.isArray(news) && news.length > 0) {
                        renderNews(news);
                    } else {
                        renderNews(mockHotNews);
                    }
                } else {
                    renderNews(mockHotNews);
                }
            } catch (e) {
                console.log('Using mock data');
                renderNews(mockHotNews);
            }
        }

        initTicker();
        
        // 直接显示新闻，不需要等待API
        renderNews(mockHotNews);

        // 手动更新新闻按钮功能（可选）
        // fetchAInews(); // 如需更新新闻数据，手动调用

        const exportAllBtn = document.createElement('button');
        exportAllBtn.className = 'export-all-btn';
        exportAllBtn.innerHTML = `
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>

                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            导出全部新闻为长图
        `;
        exportAllBtn.onclick = exportAll;
        document.querySelector('main').appendChild(exportAllBtn);
    </script>
