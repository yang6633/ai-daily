name: Daily AI News Update

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点 (= 北京时间 8点)
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch AI news
        run: |
          pip install requests
          python update_news.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git status
          if [ -n "$(git diff --staged --name-only)" ]; then
            git commit -m "daily: update AI news $(date +%Y-%m-%d)"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yang6633/ai-daily.git
          else
            echo "No changes to commit"
          fi
