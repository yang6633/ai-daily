name: Daily AI News Update

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点 (= 北京时间 8点)
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch AI news
        env:
          API_KEY: sk-sxywzqwtlsqqmahggohedzfbrmmncjexmrqhuqdfxuvxypgq
        run: python update_news.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --local credential.helper store
          echo "https://x-access-token:$GITHUB_TOKEN@github.com" > ~/.git-credentials
          git add index.html
          git diff --staged --quiet || git commit -m "daily: update AI news $(date +%Y-%m-%d)"
          git push
